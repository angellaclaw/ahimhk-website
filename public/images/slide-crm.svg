<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" width="1920" height="600">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c6fb"/>
      <stop offset="100%" style="stop-color:#005bea"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f83600"/>
      <stop offset="100%" style="stop-color:#f9d423"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="600" fill="url(#bg1)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="200" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1800" cy="500" r="300" fill="rgba(255,255,255,0.05)"/>
  <circle cx="960" cy="300" r="400" fill="rgba(255,255,255,0.03)"/>

  <!-- Left side: CRM Network graphic -->
  <g transform="translate(80, 100)">
    <!-- Central node -->
    <circle cx="200" cy="200" r="60" fill="rgba(255,255,255,0.25)" filter="url(#glow)"/>
    <circle cx="200" cy="200" r="40" fill="rgba(255,255,255,0.5)"/>
    <text x="200" y="208" font-family="Arial" font-size="20" fill="white" text-anchor="middle" font-weight="bold">CRM</text>

    <!-- Connected nodes -->
    <circle cx="80" cy="100" r="35" fill="url(#card1)"/>
    <text x="80" y="106" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Sales</text>
    <line x1="115" y1="130" x2="160" y2="170" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>

    <circle cx="320" cy="80" r="35" fill="url(#card2)"/>
    <text x="320" y="86" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Marketing</text>
    <line x1="295" y1="110" x2="240" y2="165" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>

    <circle cx="350" cy="220" r="35" fill="url(#card3)"/>
    <text x="350" y="226" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Support</text>
    <line x1="315" y1="210" x2="250" y2="205" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>

    <circle cx="60" cy="320" r="35" fill="url(#card1)"/>
    <text x="60" y="326" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Leads</text>
    <line x1="95" y1="300" x2="155" y2="230" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>

    <circle cx="340" cy="350" r="35" fill="url(#card2)"/>
    <text x="340" y="356" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Reports</text>
    <line x1="305" y1="330" x2="240" y2="245" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  </g>

  <!-- Right side: Dashboard mockup -->
  <g transform="translate(1050, 60)">
    <!-- Dashboard frame -->
    <rect x="0" y="0" width="800" height="480" rx="16" fill="rgba(255,255,255,0.15)"/>

    <!-- Top bar -->
    <rect x="0" y="0" width="800" height="50" rx="16" fill="rgba(0,0,0,0.2)"/>
    <rect x="0" y="30" width="800" height="20" fill="rgba(0,0,0,0.2)"/>
    <circle cx="30" cy="25" r="8" fill="#ff5f57"/>
    <circle cx="55" cy="25" r="8" fill="#ffbd2e"/>
    <circle cx="80" cy="25" r="8" fill="#28c840"/>
    <text x="400" y="30" font-family="Arial" font-size="14" fill="white" text-anchor="middle" opacity="0.8">Customer Relationship Management Dashboard</text>

    <!-- KPI Cards row -->
    <rect x="20" y="70" width="170" height="90" rx="10" fill="url(#card1)"/>
    <text x="105" y="105" font-family="Arial" font-size="28" fill="white" text-anchor="middle" font-weight="bold">2,847</text>
    <text x="105" y="128" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Active Customers ↑12%</text>

    <rect x="210" y="70" width="170" height="90" rx="10" fill="url(#card2)"/>
    <text x="295" y="105" font-family="Arial" font-size="28" fill="white" text-anchor="middle" font-weight="bold">$1.2M</text>
    <text x="295" y="128" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Revenue ↑8%</text>

    <rect x="400" y="70" width="170" height="90" rx="10" fill="url(#card3)"/>
    <text x="485" y="105" font-family="Arial" font-size="28" fill="white" text-anchor="middle" font-weight="bold">98%</text>
    <text x="485" y="128" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Satisfaction Score</text>

    <rect x="590" y="70" width="190" height="90" rx="10" fill="rgba(255,255,255,0.3)"/>
    <text x="685" y="105" font-family="Arial" font-size="28" fill="white" text-anchor="middle" font-weight="bold">156</text>
    <text x="685" y="128" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">New Leads Today</text>

    <!-- Bar chart area -->
    <rect x="20" y="180" width="360" height="200" rx="10" fill="rgba(255,255,255,0.1)"/>
    <text x="200" y="205" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">Monthly Sales Performance</text>
    <!-- Bars -->
    <rect x="50" y="340" width="30" height="25" rx="4" fill="#00c6fb"/>
    <rect x="100" y="310" width="30" height="55" rx="4" fill="#00c6fb"/>
    <rect x="150" y="280" width="30" height="85" rx="4" fill="#f83600"/>
    <rect x="200" y="260" width="30" height="105" rx="4" fill="#f83600"/>
    <rect x="250" y="240" width="30" height="125" rx="4" fill="#38ef7d"/>
    <rect x="300" y="220" width="30" height="145" rx="4" fill="#38ef7d"/>
    <rect x="350" y="250" width="30" height="115" rx="4" fill="#667eea"/>
    <!-- Axis labels -->
    <text x="65" y="390" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">Jan</text>
    <text x="215" y="390" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">Mar</text>
    <text x="365" y="390" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">May</text>

    <!-- Pie chart area -->
    <rect x="410" y="180" width="370" height="200" rx="10" fill="rgba(255,255,255,0.1)"/>
    <text x="595" y="205" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">Customer Segments</text>
    <!-- Pie segments (simplified as circles) -->
    <circle cx="530" cy="300" r="70" fill="#00c6fb"/>
    <path d="M 530 300 L 530 230 A 70 70 0 0 1 590 330 Z" fill="#f83600"/>
    <path d="M 530 300 L 590 330 A 70 70 0 0 1 470 345 Z" fill="#38ef7d"/>
    <path d="M 530 300 L 470 345 A 70 70 0 0 1 470 255 Z" fill="#667eea"/>
    <path d="M 530 300 L 470 255 A 70 70 0 0 1 530 230 Z" fill="#f9d423"/>
    <circle cx="530" cy="300" r="30" fill="rgba(255,255,255,0.15)"/>
    <!-- Legend -->
    <rect x="640" y="220" width="12" height="12" rx="3" fill="#00c6fb"/><text x="658" y="230" font-family="Arial" font-size="10" fill="white">Enterprise 35%</text>
    <rect x="640" y="245" width="12" height="12" rx="3" fill="#f83600"/><text x="658" y="255" font-family="Arial" font-size="10" fill="white">SMB 25%</text>
    <rect x="640" y="270" width="12" height="12" rx="3" fill="#38ef7d"/><text x="658" y="280" font-family="Arial" font-size="10" fill="white">Startup 20%</text>
    <rect x="640" y="295" width="12" height="12" rx="3" fill="#667eea"/><text x="658" y="305" font-family="Arial" font-size="10" fill="white">Consumer 15%</text>
    <rect x="640" y="320" width="12" height="12" rx="3" fill="#f9d423"/><text x="658" y="330" font-family="Arial" font-size="10" fill="white">Other 5%</text>

    <!-- Bottom table -->
    <rect x="20" y="400" width="760" height="60" rx="10" fill="rgba(255,255,255,0.1)"/>
    <text x="100" y="425" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.6)">Customer</text>
    <text x="250" y="425" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.6)">Status</text>
    <text x="380" y="425" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.6)">Value</text>
    <text x="520" y="425" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.6)">Last Contact</text>
    <text x="680" y="425" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.6)">Action</text>
    <circle cx="75" cy="440" r="10" fill="rgba(0,198,251,0.5)"/>
    <text x="100" y="444" font-family="Arial" font-size="9" fill="white">Acme Corp</text>
    <rect x="220" y="435" width="60" height="16" rx="8" fill="#38ef7d"/>
    <text x="250" y="446" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Active</text>
    <text x="380" y="444" font-family="Arial" font-size="9" fill="white">$45,200</text>
    <text x="520" y="444" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.7)">2 hours ago</text>
    <rect x="640" y="434" width="60" height="18" rx="9" fill="url(#card1)"/>
    <text x="670" y="446" font-family="Arial" font-size="8" fill="white" text-anchor="middle">View</text>
  </g>
</svg>
