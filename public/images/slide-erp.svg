<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" width="1920" height="600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="ora" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f37335"/>
      <stop offset="100%" style="stop-color:#fdc830"/>
    </linearGradient>
    <linearGradient id="blu" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2193b0"/>
      <stop offset="100%" style="stop-color:#6dd5ed"/>
    </linearGradient>
    <linearGradient id="pur" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cc2b5e"/>
      <stop offset="100%" style="stop-color:#753a88"/>
    </linearGradient>
    <linearGradient id="grn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#134e5e"/>
      <stop offset="100%" style="stop-color:#71b280"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="600" fill="url(#bg2)"/>

  <!-- Decorative elements -->
  <circle cx="1700" cy="100" r="250" fill="rgba(249,87,56,0.08)"/>
  <circle cx="200" cy="500" r="200" fill="rgba(33,147,176,0.08)"/>
  <circle cx="960" cy="300" r="350" fill="rgba(255,255,255,0.02)"/>

  <!-- Left: Odoo-style module icons -->
  <g transform="translate(60, 80)">
    <!-- Module cards -->
    <rect x="0" y="0" width="280" height="440" rx="16" fill="rgba(255,255,255,0.08)"/>

    <text x="140" y="30" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="bold">OdooERP Modules</text>

    <!-- Sales module -->
    <rect x="15" y="50" width="250" height="55" rx="10" fill="url(#ora)"/>
    <text x="140" y="78" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">💰 Sales</text>
    <text x="140" y="96" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Quotations • Orders • Invoicing</text>

    <!-- Inventory -->
    <rect x="15" y="115" width="250" height="55" rx="10" fill="url(#blu)"/>
    <text x="140" y="143" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">📦 Inventory</text>
    <text x="140" y="161" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Stock • Warehouses • Transfers</text>

    <!-- Accounting -->
    <rect x="15" y="180" width="250" height="55" rx="10" fill="url(#pur)"/>
    <text x="140" y="208" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">📊 Accounting</text>
    <text x="140" y="226" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Invoices • Expenses • Banking</text>

    <!-- HR -->
    <rect x="15" y="245" width="250" height="55" rx="10" fill="url(#grn)"/>
    <text x="140" y="273" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">👥 HR &amp; Payroll</text>
    <text x="140" y="291" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Employees • Contracts • Payslips</text>

    <!-- CRM -->
    <rect x="15" y="310" width="250" height="55" rx="10" fill="url(#ora)"/>
    <text x="140" y="338" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">🤝 CRM</text>
    <text x="140" y="356" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Leads • Opportunities • Tasks</text>

    <!-- eCommerce -->
    <rect x="15" y="375" width="250" height="55" rx="10" fill="url(#blu)"/>
    <text x="140" y="403" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">🌐 eCommerce</text>
    <text x="140" y="421" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Website • Blog • SEO • Shop</text>
  </g>

  <!-- Center: ERP Integration hub -->
  <g transform="translate(600, 80)" filter="url(#glow2)">
    <circle cx="360" cy="220" r="120" fill="rgba(249,87,56,0.2)"/>
    <circle cx="360" cy="220" r="80" fill="rgba(249,87,56,0.3)"/>
    <circle cx="360" cy="220" r="45" fill="rgba(255,255,255,0.9)"/>
    <text x="360" y="215" font-family="Arial" font-size="11" fill="#302b63" text-anchor="middle" font-weight="bold">ERP</text>
    <text x="360" y="230" font-family="Arial" font-size="11" fill="#302b63" text-anchor="middle" font-weight="bold">Hub</text>

    <!-- Connecting lines to modules -->
    <line x1="280" y1="150" x2="300" y2="180" stroke="#fdc830" stroke-width="4" stroke-dasharray="8,4"/>
    <line x1="440" y1="150" x2="420" y2="180" stroke="#6dd5ed" stroke-width="4" stroke-dasharray="8,4"/>
    <line x1="250" y1="280" x2="290" y2="260" stroke="#cc2b5e" stroke-width="4" stroke-dasharray="8,4"/>
    <line x1="470" y1="280" x2="430" y2="260" stroke="#71b280" stroke-width="4" stroke-dasharray="8,4"/>
    <line x1="360" y1="340" x2="360" y2="310" stroke="#fdc830" stroke-width="4" stroke-dasharray="8,4"/>
  </g>

  <!-- Right: Odoo dashboard -->
  <g transform="translate(1100, 40)">
    <rect x="0" y="0" width="760" height="520" rx="16" fill="rgba(255,255,255,0.12)"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="760" height="50" rx="16" fill="rgba(0,0,0,0.15)"/>
    <rect x="0" y="30" width="760" height="20" fill="rgba(0,0,0,0.15)"/>
    <circle cx="30" cy="25" r="8" fill="#ff5f57"/>
    <circle cx="55" cy="25" r="8" fill="#ffbd2e"/>
    <circle cx="80" cy="25" r="8" fill="#28c840"/>
    <text x="380" y="30" font-family="Arial" font-size="14" fill="white" text-anchor="middle" opacity="0.9">OdooERP — Accounting Dashboard</text>

    <!-- Financial KPIs -->
    <rect x="20" y="65" width="165" height="80" rx="10" fill="url(#ora)"/>
    <text x="102" y="95" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Total Revenue</text>
    <text x="102" y="125" font-family="Arial" font-size="24" fill="white" text-anchor="middle" font-weight="bold">$3,847,200</text>

    <rect x="200" y="65" width="165" height="80" rx="10" fill="url(#blu)"/>
    <text x="282" y="95" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Outstanding</text>
    <text x="282" y="125" font-family="Arial" font-size="24" fill="white" text-anchor="middle" font-weight="bold">$423,500</text>

    <rect x="380" y="65" width="165" height="80" rx="10" fill="url(#pur)"/>
    <text x="462" y="95" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Expenses</text>
    <text x="462" y="125" font-family="Arial" font-size="24" fill="white" text-anchor="middle" font-weight="bold">$1,203,800</text>

    <rect x="560" y="65" width="180" height="80" rx="10" fill="url(#grn)"/>
    <text x="650" y="95" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Net Profit</text>
    <text x="650" y="125" font-family="Arial" font-size="24" fill="white" text-anchor="middle" font-weight="bold">$2,643,400</text>

    <!-- Line chart -->
    <rect x="20" y="160" width="430" height="200" rx="10" fill="rgba(255,255,255,0.08)"/>
    <text x="235" y="185" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">Revenue vs Expenses — Last 6 Months</text>
    <!-- Grid lines -->
    <line x1="60" y1="210" x2="420" y2="210" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <line x1="60" y1="250" x2="420" y2="250" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <line x1="60" y1="290" x2="420" y2="290" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <line x1="60" y1="330" x2="420" y2="330" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- Revenue line (orange) -->
    <polyline points="70,320 140,280 210,250 280,220 350,200 410,180" fill="none" stroke="#f37335" stroke-width="3"/>
    <!-- Expenses line (blue) -->
    <polyline points="70,340 140,320 210,300 280,290 350,310 410,295" fill="none" stroke="#6dd5ed" stroke-width="3"/>
    <!-- Legend -->
    <rect x="70" y="345" width="20" height="4" rx="2" fill="#f37335"/>
    <text x="95" y="350" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.7)">Revenue</text>
    <rect x="160" y="345" width="20" height="4" rx="2" fill="#6dd5ed"/>
    <text x="185" y="350" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.7)">Expenses</text>
    <!-- Month labels -->
    <text x="70" y="365" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Jan</text>
    <text x="210" y="365" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Mar</text>
    <text x="350" y="365" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">May</text>
    <text x="410" y="365" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Jun</text>

    <!-- Invoice list -->
    <rect x="470" y="160" width="270" height="200" rx="10" fill="rgba(255,255,255,0.08)"/>
    <text x="605" y="185" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">Recent Invoices</text>
    <line x1="490" y1="198" x2="720" y2="198" stroke="rgba(255,255,255,0.15)"/>
    <!-- Invoice rows -->
    <text x="490" y="218" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.7)">INV-2024-001</text>
    <text x="610" y="218" font-family="Arial" font-size="9" fill="white" text-anchor="middle">$12,500</text>
    <rect x="660" y="208" width="55" height="14" rx="7" fill="#38ef7d"/>
    <text x="688" y="218" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Paid</text>
    <line x1="490" y1="232" x2="720" y2="232" stroke="rgba(255,255,255,0.1)"/>

    <text x="490" y="252" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.7)">INV-2024-002</text>
    <text x="610" y="252" font-family="Arial" font-size="9" fill="white" text-anchor="middle">$8,200</text>
    <rect x="660" y="242" width="55" height="14" rx="7" fill="#fdc830"/>
    <text x="688" y="252" font-family="Arial" font-size="8" fill="#302b63" text-anchor="middle">Pending</text>
    <line x1="490" y1="266" x2="720" y2="266" stroke="rgba(255,255,255,0.1)"/>

    <text x="490" y="286" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.7)">INV-2024-003</text>
    <text x="610" y="286" font-family="Arial" font-size="9" fill="white" text-anchor="middle">$24,000</text>
    <rect x="660" y="276" width="55" height="14" rx="7" fill="#38ef7d"/>
    <text x="688" y="286" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Paid</text>
    <line x1="490" y1="300" x2="720" y2="300" stroke="rgba(255,255,255,0.1)"/>

    <text x="490" y="320" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.7)">INV-2024-004</text>
    <text x="610" y="320" font-family="Arial" font-size="9" fill="white" text-anchor="middle">$15,750</text>
    <rect x="660" y="310" width="55" height="14" rx="7" fill="#cc2b5e"/>
    <text x="688" y="320" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Overdue</text>

    <!-- Inventory mini cards -->
    <rect x="20" y="380" width="350" height="120" rx="10" fill="rgba(255,255,255,0.08)"/>
    <text x="195" y="403" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">Inventory Status</text>
    <rect x="40" y="418" width="80" height="65" rx="8" fill="url(#blu)"/>
    <text x="80" y="448" font-family="Arial" font-size="22" fill="white" text-anchor="middle" font-weight="bold">1,284</text>
    <text x="80" y="468" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">Products</text>
    <rect x="135" y="418" width="80" height="65" rx="8" fill="url(#ora)"/>
    <text x="175" y="448" font-family="Arial" font-size="22" fill="white" text-anchor="middle" font-weight="bold">48</text>
    <text x="175" y="468" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">Low Stock</text>
    <rect x="230" y="418" width="80" height="65" rx="8" fill="url(#grn)"/>
    <text x="270" y="448" font-family="Arial" font-size="22" fill="white" text-anchor="middle" font-weight="bold">312</text>
    <text x="270" y="468" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">Orders</text>
    <rect x="325" y="418" width="30" height="65" rx="8" fill="rgba(255,255,255,0.2)"/>
    <text x="340" y="455" font-family="Arial" font-size="18" fill="white" text-anchor="middle">→</text>

    <!-- Quick actions -->
    <rect x="390" y="380" width="350" height="120" rx="10" fill="rgba(255,255,255,0.08)"/>
    <text x="565" y="403" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">⚡ Quick Actions</text>
    <rect x="410" y="418" width="100" height="32" rx="8" fill="url(#ora)"/>
    <text x="460" y="438" font-family="Arial" font-size="10" fill="white" text-anchor="middle">+ New Invoice</text>
    <rect x="525" y="418" width="100" height="32" rx="8" fill="url(#blu)"/>
    <text x="575" y="438" font-family="Arial" font-size="10" fill="white" text-anchor="middle">+ Purchase</text>
    <rect x="640" y="418" width="90" height="32" rx="8" fill="url(#pur)"/>
    <text x="685" y="438" font-family="Arial" font-size="10" fill="white" text-anchor="middle">+ Customer</text>
    <rect x="410" y="460" width="100" height="32" rx="8" fill="url(#grn)"/>
    <text x="460" y="480" font-family="Arial" font-size="10" fill="white" text-anchor="middle">+ Product</text>
    <rect x="525" y="460" width="100" height="32" rx="8" fill="rgba(255,255,255,0.2)"/>
    <text x="575" y="480" font-family="Arial" font-size="10" fill="white" text-anchor="middle">📊 Reports</text>
    <rect x="640" y="460" width="90" height="32" rx="8" fill="rgba(255,255,255,0.2)"/>
    <text x="685" y="480" font-family="Arial" font-size="10" fill="white" text-anchor="middle">⚙️ Settings</text>
  </g>
</svg>
