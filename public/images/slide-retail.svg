<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" width="1920" height="600">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff416c"/>
      <stop offset="50%" style="stop-color:#ff4b2b"/>
      <stop offset="100%" style="stop-color:#f9d423"/>
    </linearGradient>
    <linearGradient id="rblu" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <linearGradient id="rgrn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#56ab2f"/>
      <stop offset="100%" style="stop-color:#a8e063"/>
    </linearGradient>
    <linearGradient id="rpink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6a88"/>
      <stop offset="100%" style="stop-color:#ee609c"/>
    </linearGradient>
    <linearGradient id="rori" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="600" fill="url(#bg3)"/>

  <!-- Background decorative -->
  <circle cx="1600" cy="300" r="400" fill="rgba(255,255,255,0.05)"/>
  <circle cx="200" cy="400" r="250" fill="rgba(0,0,0,0.05)"/>
  <circle cx="960" cy="0" r="300" fill="rgba(255,255,255,0.05)"/>

  <!-- POS Terminal Left -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="260" height="400" rx="20" fill="rgba(0,0,0,0.3)"/>
    <!-- Screen -->
    <rect x="15" y="15" width="230" height="260" rx="12" fill="rgba(255,255,255,0.95)"/>
    <!-- Header -->
    <rect x="15" y="15" width="230" height="40" rx="12" fill="url(#rblu)"/>
    <rect x="15" y="40" width="230" height="15" fill="url(#rblu)"/>
    <text x="130" y="40" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">Point of Sale</text>

    <!-- Order items -->
    <rect x="30" y="65" width="200" height="28" rx="6" fill="rgba(86,171,47,0.15)"/>
    <text x="40" y="83" font-family="Arial" font-size="10" fill="#333">Premium Package</text>
    <text x="200" y="83" font-family="Arial" font-size="10" fill="#333" text-anchor="end">$299.00</text>

    <rect x="30" y="100" width="200" height="28" rx="6" fill="rgba(0,210,255,0.12)"/>
    <text x="40" y="118" font-family="Arial" font-size="10" fill="#333">Monthly Subscription</text>
    <text x="200" y="118" font-family="Arial" font-size="10" fill="#333" text-anchor="end">$49.00</text>

    <rect x="30" y="135" width="200" height="28" rx="6" fill="rgba(255,106,136,0.12)"/>
    <text x="40" y="153" font-family="Arial" font-size="10" fill="#333">Support Add-on</text>
    <text x="200" y="153" font-family="Arial" font-size="10" fill="#333" text-anchor="end">$25.00</text>

    <!-- Divider -->
    <line x1="30" y1="175" x2="230" y2="175" stroke="#ddd" stroke-width="1"/>

    <!-- Totals -->
    <text x="40" y="195" font-family="Arial" font-size="10" fill="#666">Subtotal</text>
    <text x="220" y="195" font-family="Arial" font-size="10" fill="#333" text-anchor="end">$373.00</text>
    <text x="40" y="213" font-family="Arial" font-size="10" fill="#666">Discount</text>
    <text x="220" y="213" font-family="Arial" font-size="10" fill="#56ab2f" text-anchor="end">-$37.30</text>
    <text x="40" y="235" font-family="Arial" font-size="14" fill="#333" font-weight="bold">TOTAL</text>
    <text x="220" y="235" font-family="Arial" font-size="14" fill="#3a7bd5" text-anchor="end" font-weight="bold">$335.70</text>

    <!-- Member -->
    <rect x="30" y="248" width="200" height="24" rx="6" fill="rgba(255,193,7,0.2)"/>
    <text x="130" y="263" font-family="Arial" font-size="9" fill="#c47a00" text-anchor="middle">👤 Member: Grace L. — Gold Tier</text>

    <!-- Pay button -->
    <rect x="15" y="290" width="230" height="70" rx="12" fill="url(#rgrn)"/>
    <text x="130" y="330" font-family="Arial" font-size="18" fill="white" text-anchor="middle" font-weight="bold">$335.70</text>

    <!-- Keypad hint -->
    <text x="130" y="390" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">💳 Card • 💵 Cash • 📱 FPS</text>
  </g>

  <!-- Center: Retail elements -->
  <g transform="translate(520, 60)">
    <!-- Shopping bag icon -->
    <g filter="url(#glow3)">
      <rect x="80" y="100" width="240" height="280" rx="20" fill="rgba(255,255,255,0.15)"/>
      <path d="M160 100 L160 70 Q160 50 180 50 L220 50 Q240 50 240 70 L240 100" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="8"/>
      <text x="200" y="200" font-family="Arial" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">BAG</text>
      <text x="200" y="230" font-family="Arial" font-size="40" fill="white" text-anchor="middle" font-weight="bold">eShop</text>
      <text x="200" y="260" font-family="Arial" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle">B2C • B2B</text>
    </g>
  </g>

  <!-- Right: Retail Dashboard -->
  <g transform="translate(1050, 40)">
    <rect x="0" y="0" width="790" height="520" rx="16" fill="rgba(255,255,255,0.12)"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="790" height="50" rx="16" fill="rgba(0,0,0,0.15)"/>
    <rect x="0" y="30" width="790" height="20" fill="rgba(0,0,0,0.15)"/>
    <circle cx="30" cy="25" r="8" fill="#ff5f57"/>
    <circle cx="55" cy="25" r="8" fill="#ffbd2e"/>
    <circle cx="80" cy="25" r="8" fill="#28c840"/>
    <text x="395" y="30" font-family="Arial" font-size="14" fill="white" text-anchor="middle" opacity="0.9">Retail Operations Dashboard</text>

    <!-- KPI Row -->
    <rect x="20" y="65" width="175" height="80" rx="10" fill="url(#rblu)"/>
    <text x="107" y="92" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Today's Sales</text>
    <text x="107" y="122" font-family="Arial" font-size="22" fill="white" text-anchor="middle" font-weight="bold">$18,420</text>

    <rect x="210" y="65" width="175" height="80" rx="10" fill="url(#rpink)"/>
    <text x="297" y="92" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Orders</text>
    <text x="297" y="122" font-family="Arial" font-size="22" fill="white" text-anchor="middle" font-weight="bold">142</text>

    <rect x="400" y="65" width="175" height="80" rx="10" fill="url(#rori)"/>
    <text x="487" y="92" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">New Members</text>
    <text x="487" y="122" font-family="Arial" font-size="22" fill="white" text-anchor="middle" font-weight="bold">+38</text>

    <rect x="590" y="65" width="180" height="80" rx="10" fill="url(#rgrn)"/>
    <text x="680" y="92" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Loyalty Points Redeemed</text>
    <text x="680" y="122" font-family="Arial" font-size="22" fill="white" text-anchor="middle" font-weight="bold">2,840</text>

    <!-- Sales by category donut -->
    <rect x="20" y="160" width="350" height="200" rx="10" fill="rgba(255,255,255,0.08)"/>
    <text x="195" y="185" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">Sales by Category</text>
    <!-- Donut -->
    <circle cx="130" cy="290" r="70" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="20"/>
    <circle cx="130" cy="290" r="70" fill="none" stroke="#00d2ff" stroke-width="20"
      stroke-dasharray="154 286" stroke-dashoffset="0" transform="rotate(-90 130 290)"/>
    <circle cx="130" cy="290" r="70" fill="none" stroke="#ff6a88" stroke-width="20"
      stroke-dasharray="110 330" stroke-dashoffset="-154" transform="rotate(-90 130 290)"/>
    <circle cx="130" cy="290" r="70" fill="none" stroke="#ffd200" stroke-width="20"
      stroke-dasharray="88 352" stroke-dashoffset="-264" transform="rotate(-90 130 290)"/>
    <circle cx="130" cy="290" r="70" fill="none" stroke="#56ab2f" stroke-width="20"
      stroke-dasharray="88 352" stroke-dashoffset="-352" transform="rotate(-90 130 290)"/>
    <circle cx="130" cy="290" r="40" fill="rgba(255,255,255,0.1)"/>
    <text x="130" y="287" font-family="Arial" font-size="16" fill="white" text-anchor="middle" font-weight="bold">$18.4K</text>
    <text x="130" y="303" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">Today</text>
    <!-- Legend -->
    <rect x="230" y="210" width="12" height="12" rx="3" fill="#00d2ff"/>
    <text x="248" y="220" font-family="Arial" font-size="10" fill="white">Electronics 35%</text>
    <rect x="230" y="235" width="12" height="12" rx="3" fill="#ff6a88"/>
    <text x="248" y="245" font-family="Arial" font-size="10" fill="white">Fashion 25%</text>
    <rect x="230" y="260" width="12" height="12" rx="3" fill="#ffd200"/>
    <text x="248" y="270" font-family="Arial" font-size="10" fill="white">Food &amp; Bev 20%</text>
    <rect x="230" y="285" width="12" height="12" rx="3" fill="#56ab2f"/>
    <text x="248" y="295" font-family="Arial" font-size="10" fill="white">Home 20%</text>

    <!-- Top products -->
    <rect x="390" y="160" width="380" height="200" rx="10" fill="rgba(255,255,255,0.08)"/>
    <text x="580" y="185" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">🏆 Top Selling Products</text>
    <line x1="410" y1="198" x2="750" y2="198" stroke="rgba(255,255,255,0.15)"/>
    <!-- Product rows -->
    <text x="420" y="218" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.8)">#1</text>
    <rect x="445" y="208" width="35" height="18" rx="4" fill="url(#rblu)"/>
    <text x="463" y="220" font-family="Arial" font-size="8" fill="white" text-anchor="middle">IMG</text>
    <text x="495" y="220" font-family="Arial" font-size="10" fill="white">Wireless Earbuds Pro</text>
    <text x="730" y="220" font-family="Arial" font-size="10" fill="#ffd200" text-anchor="end">$4,280</text>
    <line x1="410" y1="232" x2="750" y2="232" stroke="rgba(255,255,255,0.08)"/>

    <text x="420" y="252" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.8)">#2</text>
    <rect x="445" y="242" width="35" height="18" rx="4" fill="url(#rpink)"/>
    <text x="463" y="254" font-family="Arial" font-size="8" fill="white" text-anchor="middle">IMG</text>
    <text x="495" y="254" font-family="Arial" font-size="10" fill="white">Smart Watch Series X</text>
    <text x="730" y="254" font-family="Arial" font-size="10" fill="#ffd200" text-anchor="end">$3,650</text>
    <line x1="410" y1="266" x2="750" y2="266" stroke="rgba(255,255,255,0.08)"/>

    <text x="420" y="286" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.8)">#3</text>
    <rect x="445" y="276" width="35" height="18" rx="4" fill="url(#rori)"/>
    <text x="463" y="288" font-family="Arial" font-size="8" fill="white" text-anchor="middle">IMG</text>
    <text x="495" y="288" font-family="Arial" font-size="10" fill="white">Portable Speaker BT</text>
    <text x="730" y="288" font-family="Arial" font-size="10" fill="#ffd200" text-anchor="end">$2,920</text>
    <line x1="410" y1="300" x2="750" y2="300" stroke="rgba(255,255,255,0.08)"/>

    <text x="420" y="320" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.8)">#4</text>
    <rect x="445" y="310" width="35" height="18" rx="4" fill="url(#rgrn)"/>
    <text x="463" y="322" font-family="Arial" font-size="8" fill="white" text-anchor="middle">IMG</text>
    <text x="495" y="322" font-family="Arial" font-size="10" fill="white">Leather Wallet Premium</text>
    <text x="730" y="322" font-family="Arial" font-size="10" fill="#ffd200" text-anchor="end">$1,840</text>

    <!-- Bottom section: Member loyalty &amp; channels -->
    <rect x="20" y="380" width="350" height="120" rx="10" fill="rgba(255,255,255,0.08)"/>
    <text x="195" y="403" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">💎 Member Loyalty Program</text>
    <!-- Member tiers -->
    <rect x="35" y="415" width="90" height="70" rx="8" fill="rgba(200,200,200,0.15)"/>
    <text x="80" y="440" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">Silver</text>
    <text x="80" y="462" font-family="Arial" font-size="18" fill="rgba(200,200,200,0.8)" text-anchor="middle">324</text>

    <rect x="130" y="415" width="90" height="70" rx="8" fill="rgba(255,193,7,0.25)"/>
    <text x="175" y="440" font-family="Arial" font-size="9" fill="rgba(255,193,7,0.9)" text-anchor="middle">Gold</text>
    <text x="175" y="462" font-family="Arial" font-size="18" fill="#ffd200" text-anchor="middle">186</text>

    <rect x="225" y="415" width="90" height="70" rx="8" fill="rgba(255,215,0,0.3)"/>
    <text x="270" y="440" font-family="Arial" font-size="9" fill="rgba(255,215,0,0.9)" text-anchor="middle">Platinum</text>
    <text x="270" y="462" font-family="Arial" font-size="18" fill="white" text-anchor="middle">52</text>

    <rect x="320" y="415" width="35" height="70" rx="8" fill="rgba(255,255,255,0.1)"/>
    <text x="337" y="455" font-family="Arial" font-size="18" fill="white" text-anchor="middle">→</text>

    <!-- Sales channels -->
    <rect x="390" y="380" width="380" height="120" rx="10" fill="rgba(255,255,255,0.08)"/>
    <text x="580" y="403" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">📡 Sales Channels</text>
    <rect x="410" y="415" width="100" height="70" rx="10" fill="url(#rblu)"/>
    <text x="460" y="442" font-family="Arial" font-size="20" fill="white" text-anchor="middle">🏪</text>
    <text x="460" y="462" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Retail Store</text>
    <text x="460" y="478" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">$8,200</text>

    <rect x="525" y="415" width="100" height="70" rx="10" fill="url(#rpink)"/>
    <text x="575" y="442" font-family="Arial" font-size="20" fill="white" text-anchor="middle">🌐</text>
    <text x="575" y="462" font-family="Arial" font-size="10" fill="white" text-anchor="middle">eShop</text>
    <text x="575" y="478" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">$6,180</text>

    <rect x="640" y="415" width="110" height="70" rx="10" fill="url(#rori)"/>
    <text x="695" y="442" font-family="Arial" font-size="20" fill="white" text-anchor="middle">📱</text>
    <text x="695" y="462" font-family="Arial" font-size="10" fill="white" text-anchor="middle">WeChat Store</text>
    <text x="695" y="478" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">$4,040</text>
  </g>
</svg>
